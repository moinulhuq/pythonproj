name: Python Tests

on:
  push:
    branches: [ master, develop ]
  pull_request:
    branches: [ master, develop ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov

      - name: Run tests with coverage
        run: |
          pytest --cov=index --cov-report=xml

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

      - name: Setup Node.js (required for npm)
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Aikido CLI
        run: |
          npm install --global @aikidosec/ci-api-client

      - name: Aikido Release Scan
        env:
          AIKIDO_CI_TOKEN: ${{ secrets.AIKIDO_CI_TOKEN }}
          BRANCH_NAME: ${{ github.ref_name }}
        run: |
          aikido-api-client scan-release \
            --apikey "$AIKIDO_CI_TOKEN" \
            --branch "$BRANCH_NAME" \
            --fail-on-high