name: Python Tests

on:
  push:
    branches: [ master, develop ]
  pull_request:
    branches: [ master, develop ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov

      - name: Run tests with coverage
        run: |
          pytest --cov=index --cov-report=xml

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

      - name: Install Aikido CLI
        run: |
          curl -sSL https://cli.aikido.dev/install.sh | bash
          echo "$HOME/.aikido/bin" >> $GITHUB_PATH
          aikido-api-client --version

      - name: Aikido Release Scan
        env:
          AIKIDO_CI_TOKEN: ${{ secrets.AIKIDO_CI_TOKEN }}
          AIKIDO_REPOSITORY_ID: ${{ secrets.AIKIDO_REPOSITORY_ID }}
        run: |
          aikido-api-client scan-release \
            --apikey "$AIKIDO_CI_TOKEN" \
            --repository-id "$AIKIDO_REPOSITORY_ID"
